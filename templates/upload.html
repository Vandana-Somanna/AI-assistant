<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Documents</title>
<style>
body {
  font-family: system-ui;
  background: #0f1117;
  color: #e2e8f0;
}

.container {
  max-width: 600px;
  margin: 80px auto;
}

.card {
  background: #1a1d27;
  padding: 24px;
  border-radius: 12px;
}

button {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

pre {
  margin-top: 15px;
  background: #111827;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Upload .txt File</h2>
    <input type="file" id="file">
    <br><br>
    <button onclick="upload()">Upload</button>
    <pre id="result"></pre>
  </div>
</div>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const fd = new FormData();
  fd.append("file", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: fd
  });

  const data = await res.json();
  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
