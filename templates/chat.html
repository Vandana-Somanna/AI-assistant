<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1d27;
            --text-main: #e2e8f0;
            --accent: #6366f1;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100-vh;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .user .avatar { background: #4b5563; }
        .agent .avatar { background: var(--accent); }
        .bubble {
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            max-width: 80%;
        }
        .input-area {
            background: var(--bg-color);
            padding: 20px;
            position: sticky;
            bottom: 0;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message agent">
        <div class="avatar">A</div>
        <div class="bubble">Hello! How can I help you today?</div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const container = document.getElementById('chat-container');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        // Append User Message
        appendMsg('user', text);
        input.value = '';
        btn.disabled = true;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, session_id: "u1" })
            });
            const data = await response.json();
            appendMsg('agent', data.answer);
        } catch (err) {
            appendMsg('agent', "Error: Could not reach the server.");
        } finally {
            btn.disabled = false;
        }
    }

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
            <div class="avatar">${role === 'user' ? 'U' : 'A'}</div>
            <div class="bubble">${text}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    btn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
